services:
  db:
    image: postgres:16-alpine
    container_name: debate-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - debate-network
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: debate-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - debate-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  alloy:
    image: grafana/alloy:latest
    container_name: debate-alloy
    restart: unless-stopped
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    environment:
      GRAFANA_CLOUD_PROMETHEUS_URL: ${GRAFANA_CLOUD_PROMETHEUS_URL:-}
      GRAFANA_CLOUD_PROMETHEUS_USERNAME: ${GRAFANA_CLOUD_PROMETHEUS_USERNAME:-}
      GRAFANA_CLOUD_PROMETHEUS_PASSWORD: ${GRAFANA_CLOUD_PROMETHEUS_PASSWORD:-}
    mem_limit: 256m
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
    networks:
      - debate-network

  backend:
    container_name: debate-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/staticfiles:/app/staticfiles
    networks:
      - debate-network
    env_file:
      - ./backend/.env
    environment:
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/django_prometheus_multiproc}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    container_name: debate-celery-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - debate-network
    env_file:
      - ./backend/.env
    stop_grace_period: 10m
    command: ["celery", "-A", "ProjectOpenDebate", "worker", "-l", "info"]
    healthcheck:
      test: ["CMD", "celery", "-A", "ProjectOpenDebate", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-beat:
    container_name: debate-celery-beat
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - debate-network
    env_file:
      - ./backend/.env
    stop_grace_period: 10m
    command: ["celery", "-A", "ProjectOpenDebate", "beat", "-l", "info"]

  frontend:
    container_name: debate-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - debate-network
    env_file:
      - ./frontend/.env

networks:
  debate-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
