name: Django Tests

on:
  push:
    branches: [ "dev", "master" ]
  pull_request:
    branches: [ "dev", "master" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.12']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
      ENV: test

      # Point Django to the *service containers*
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      # Redis in CI usually doesn't need a password
      REDIS_PASSWORD: ""

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Tests
        run: |
          cd backend
          python manage.py test --settings=ProjectOpenDebate.test_settings
